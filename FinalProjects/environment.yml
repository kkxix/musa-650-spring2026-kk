name: musa650-final
channels:
  - conda-forge
dependencies:
  - python=3.10
  - jupyterlab
  - notebook
  - ipykernel
  - ipywidgets
  - numpy
  - pandas
  - pyarrow
  - scipy
  - matplotlib
  - seaborn
  - pillow
  - folium
  - mapclassify
  - contextily
  - geopandas
  - shapely
  - rasterio
  - rioxarray
  - xarray
  - dask
  - distributed
  - odc-stac
  - odc-geo
  - pystac-client
  - planetary-computer
  - earthengine-api
  - scikit-image
  - scikit-learn
  - joblib
  - pip
  - pip:
      # CPU/MPS PyTorch for local notebook inference/training.
      # On Colab, keep using the runtime-provided CUDA PyTorch instead.
      - torch>=2.2,<2.8
      - torchvision>=0.17,<0.23
